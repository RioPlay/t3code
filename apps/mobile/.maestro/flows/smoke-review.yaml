appId: ${APP_ID}
---
- runFlow: ../fixtures/auth-bypass.yaml
- tapOn:
    id: "home-thread-row"
    index: 0
- assertVisible:
    id: "thread-screen"
- tapOn:
    id: "thread-accessory-review"
- assertVisible:
    id: "review-sheet"
- assertVisible:
    id: "review-js-diff-list"
- scroll:
    id: "review-js-diff-list"
    direction: DOWN
- tapOn:
    id: "review-diff-file-row"
    index: 0
    optional: true
- back
- assertVisible:
    id: "thread-screen"
