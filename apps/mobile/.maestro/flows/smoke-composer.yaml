appId: ${APP_ID}
---
- runFlow: ../fixtures/auth-bypass.yaml
- tapOn:
    id: "home-thread-row"
    index: 0
- assertVisible:
    id: "thread-screen"
- tapOn:
    id: "thread-composer-input"
- runFlow:
    when:
      visible:
        id: "composer-strip-coach-mark"
    file: ../fixtures/dismiss-composer-coach-mark.yaml
- assertVisible:
    id: "thread-composer-attach"
- assertVisible:
    id: "thread-composer-model"
- assertVisible:
    id: "thread-composer-configuration"
- inputText: "Maestro T2 composer ping"
- tapOn:
    id: "thread-composer-send"
- extendedWaitUntil:
    visible:
      text: "Maestro T2 composer ping"
    timeout: 30000
- assertVisible:
    id: "thread-feed"
- stopApp
